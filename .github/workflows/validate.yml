name: Validate application

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        id: application-build
        continue-on-error: true
        shell: bash
        run: npm run build > build.log 2>&1

      - name: Report build failure
        if: steps.application-build.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Application build failed'
            echo
            echo '```text'
            tail -100 build.log
            echo '```'
          } > build-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file build-comment.md

      - name: Stop after build failure
        if: steps.application-build.outcome == 'failure'
        run: exit 1

      - name: Run tests
        run: npm test
